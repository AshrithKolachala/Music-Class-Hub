kind = "web"
previewPath = "/"
title = "Music Teaching Platform"
version = "1.0.0"
id = "artifacts/music-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18900
name = "web"
paths = ["/"]

[services.development]
run = "bash start.sh"

[services.env]
PORT = "18900"
BASE_PATH = "/"
API_PORT = "4001"

[services.production]
build = ["bash", "-c", "BASE_PATH=/ npm run build"]
publicDir = "dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
